            renderReports() {
                let userReports = [];
                if (this.currentUser.role === 'applicant') {
                    // 申請者檢視自己歷史申請記錄
                    userReports = this.reports.filter(r => r.applicantId === this.currentUser.id);
                } else if (this.currentUser.role === 'manager') {
                    // 主管可檢視自己歷史申請/核准(審核)紀錄
                    userReports = this.reports.filter(r => 
                        r.applicantId === this.currentUser.id || r.reviewerId === this.currentUser.id
                    );
                } else {
                    // admin 檢視全部
                    userReports = [...this.reports];
                }

                // 依年份將報帳紀錄分組
                const reportsByYear = {};
                userReports.forEach(report => {
                    const year = report.date ? report.date.split('-')[0] : '其他年份';
                    if (!reportsByYear[year]) {
                        reportsByYear[year] = [];
                    }
                    reportsByYear[year].push(report);
                });

                // 年份由新到舊排序
                const sortedYears = Object.keys(reportsByYear).sort((a, b) => b.localeCompare(a));
                
                // 年份內部的報告依日期由新到舊排序
                sortedYears.forEach(year => {
                    reportsByYear[year].sort((a, b) => new Date(b.date) - new Date(a.date));
                });

                let contentHtml = '';
                if (sortedYears.length > 0) {
                    contentHtml = sortedYears.map(year => {
                        const yearReports = reportsByYear[year];
                        const listHtml = yearReports.map(report => {
                            const applicant = this.users.find(u => u.id === report.applicantId);
                            const applicantName = applicant ? applicant.name : '未知使用者';
                            const showApplicant = this.currentUser.role !== 'applicant';
                            
                            // 標示此紀錄是「我自己申請的」還是「我核准的/他人申請的」
                            let badgeRoleHtml = '';
                            if (this.currentUser.role === 'manager') {
                                if (report.applicantId === this.currentUser.id) {
                                    badgeRoleHtml = `<span class="badge" style="background: #E0F7FA; color: #006064; margin-left: 0.5rem;">個人申請</span>`;
                                } else {
                                    badgeRoleHtml = `<span class="badge" style="background: #EDE7F6; color: #311B92; margin-left: 0.5rem;">主管核准</span>`;
                                }
                            }

                            return `
                                <div class="report-item">
                                    <div>
                                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap;">
                                            <span style="font-size: 16px; font-weight: 600;">¥${report.amount}</span>
                                            <span class="badge ${report.status === 'approved' ? 'badge-approved' : report.status === 'pending' ? 'badge-pending' : 'badge-rejected'}">
                                                ${report.status === 'approved' ? '✓ 已通過' : report.status === 'pending' ? '⏳ 審核中' : '✕ 已退回'}
                                            </span>
                                            ${badgeRoleHtml}
                                        </div>
                                        ${showApplicant ? `
                                        <div class="user-info" style="margin-bottom: 0.5rem; gap: 0.5rem; align-items: center;">
                                            <div class="avatar" style="width: 24px; height: 24px; font-size: 11px;">${applicantName.charAt(0)}</div>
                                            <span style="font-size: 13px; font-weight: 500; color: var(--text-secondary);">申請人: ${applicantName}</span>
                                        </div>` : ''}
                                        <p class="report-meta">${report.category} • ${report.date} • ${report.department}</p>
                                        <p class="report-meta">${report.description}</p>
                                        ${report.comments ? `<p class="report-meta" style="color: var(--primary-dark); font-style: italic;">💬 審核意見: "${report.comments}"</p>` : ''}
                                    </div>
                                    <button class="btn-secondary btn-small" onclick="alert('報告詳情\\n\\n申請人: ${applicantName}\\n金額: ¥${report.amount}\\n日期: ${report.date}\\n類別: ${report.category}\\n部門: ${report.department}\\n狀態: ${report.status}\\n描述: ${report.description}\\n審核意見: ${report.comments || '無'}')">查看詳情</button>
                                </div>
                            `;
                        }).join('');

                        return `
                            <div class="year-section" style="margin-bottom: 2.5rem;">
                                <h3 class="year-heading" style="font-size: 20px; font-weight: 600; color: var(--primary-dark); border-left: 4px solid var(--primary-color); padding-left: 10px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;">
                                    <span>${year} 年</span>
                                    <span style="font-size: 13px; color: var(--text-secondary); font-weight: 400;">(${yearReports.length} 筆紀錄)</span>
                                </h3>
                                <div class="report-list">
                                    ${listHtml}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    contentHtml = '<div class="empty-state"><p>沒有報告記錄</p></div>';
                }

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳記錄</h2>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn-secondary btn-small" data-view="analytics">數據分析</button>
                                <button class="btn-secondary btn-small" data-export="reports">匯出 Excel</button>
                            </div>
                        </div>

                        <div>
                            ${contentHtml}
                        </div>
                    </div>
                `;
            }

            renderReview() {
                const pendingReports = this.reports.filter(r => r.status === 'pending');

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>待審核報告 (${pendingReports.length})</h2>

                        <div class="report-list">
                            ${pendingReports.length > 0 ? pendingReports.map(report => {
                                const applicant = this.users.find(u => u.id === report.applicantId);
                                return `
                                    <div class="review-item">
                                        <div>
                                            <div class="user-info">
                                                <div class="avatar">${applicant.name.charAt(0)}</div>
                                                <div class="user-details">
                                                    <p class="user-name">${applicant.name}</p>
                                                    <p class="user-email">申請金額: ¥${report.amount}</p>
                                                </div>
                                            </div>
                                            <p>${report.description}</p>
                                            <p class="report-meta">${report.category} • ${report.date}</p>
                                        </div>
                                        <div class="review-buttons">
                                            <button class="btn-success" data-approve="${report.id}">✓ 通過</button>
                                            <button class="btn-danger" data-reject="${report.id}">✕ 退回</button>
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<div class="empty-state"><p>沒有待審核的報告</p></div>'}
                        </div>
                    </div>
                `;
            }

            renderAnalytics() {
                const targetReports = this.currentUser.role === 'applicant' ? this.reports.filter(r => r.applicantId === this.currentUser.id) : this.reports;
                const totalAmount = targetReports.reduce((a, b) => a + b.amount, 0);
                const approvedAmount = targetReports
                    .filter(r => r.status === 'approved')
                    .reduce((a, b) => a + b.amount, 0);
                const reportCount = targetReports.length;
                
                const categoryTotal = {};
                targetReports.forEach(r => {
                    categoryTotal[r.category] = (categoryTotal[r.category] || 0) + r.amount;
                });

                const categoryRows = Object.entries(categoryTotal).map(([cat, amt]) => {
                    const percentage = totalAmount > 0 ? ((amt / totalAmount) * 100).toFixed(1) : '0.0';
                    return `
                        <tr>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color);">${cat}</td>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color); text-align: right; font-weight: 500;">¥${amt.toFixed(2)}</td>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color); text-align: right; color: var(--text-secondary);">${percentage}%</td>
                        </tr>
                    `;
                }).join('');

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳數據分析中心</h2>
                            <button class="btn-secondary btn-small" data-export="analytics">匯出報帳明細</button>
                        </div>

                        <div class="grid grid-auto">
                            <div class="stat-card">
                                <p class="stat-label">累積申報總額</p>
                                <p class="stat-value">¥${totalAmount.toFixed(2)}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">已核准通過總額</p>
                                <p class="stat-value" style="color: var(--success);">¥${approvedAmount.toFixed(2)}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">申報報告數量</p>
                                <p class="stat-value" style="color: var(--info);">${reportCount} 件</p>
                            </div>
                        </div>

                        <div class="grid grid-2" style="margin-top: 1.5rem;">
                            <div class="chart-container" style="display: flex; flex-direction: column;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                    <h3 style="margin: 0; font-size: 16px; color: var(--primary-dark);">報帳趨勢分析</h3>
                                    <div style="display: flex; gap: 0.25rem; background: var(--bg-secondary); padding: 2px; border-radius: 6px;">
                                        <button id="btnTrendMonth" class="btn-small" style="padding: 4px 8px; font-size: 12px; background: var(--primary-color); color: white; border-radius: 4px;">月度</button>
                                        <button id="btnTrendQuarter" class="btn-small" style="padding: 4px 8px; font-size: 12px; background: transparent; color: var(--text-secondary); border-radius: 4px;">季度</button>
                                    </div>
                                </div>
                                <div style="flex: 1; position: relative; min-height: 250px;">
                                    <canvas id="trendChart"></canvas>
                                </div>
                            </div>

                            <div class="chart-container" style="display: flex; flex-direction: column;">
                                <h3 style="margin-bottom: 1rem; font-size: 16px; color: var(--primary-dark);">費用類別分佈</h3>
                                <div style="flex: 1; position: relative; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                                    <canvas id="categoryChart" style="max-height: 250px; max-width: 250px;"></canvas>
                                </div>
                            </div>
                        </div>

                        <div class="card" style="margin-top: 1.5rem; padding: 1.5rem;">
                            <h3 style="margin-bottom: 1rem; font-size: 18px; color: var(--primary-dark);">類別數據統整</h3>
                            <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                                <thead>
                                    <tr style="background: var(--bg-secondary); text-align: left;">
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary);">類別</th>
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary); text-align: right;">報帳總額</th>
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary); text-align: right;">比例</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${categoryRows || '<tr><td colspan="3" style="text-align:center; padding: 2rem; color: var(--text-secondary);">暫無申報數據</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            renderUsers() {
                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>用戶管理</h2>

                        <div class="report-list">
                            ${this.users.map(user => `
                                <div class="report-item">
                                    <div class="user-info" style="margin-bottom: 0;">
                                        <div class="avatar">${user.name.charAt(0)}</div>
                                        <div class="user-details">
                                            <p class="user-name">${user.name}</p>
                                            <p class="user-email">${user.email}</p>
                                            <p class="report-meta">
                                                額度: ¥${user.budget} | 角色: ${user.role === 'applicant' ? '申請者' : user.role === 'manager' ? '主管' : '管理員'}
                                            </p>
                                        </div>
                                    </div>
                                    <div style="display: flex; gap: 0.5rem; flex-direction: column; min-width: 120px;">
                                        <button class="btn-secondary btn-small" data-edit-user="${user.id}">調整帳號</button>
                                        <button class="btn-danger btn-small" data-delete-user="${user.id}">註銷帳號</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            initAnalyticsCharts() {
                if (typeof Chart === 'undefined') {
                    setTimeout(() => this.initAnalyticsCharts(), 100);
                    return;
                }

                const trendCtx = document.getElementById('trendChart');
                const categoryCtx = document.getElementById('categoryChart');
                if (!trendCtx || !categoryCtx) return;

                const targetReports = this.currentUser.role === 'applicant' ? this.reports.filter(r => r.applicantId === this.currentUser.id) : this.reports;

                const catData = {};
                targetReports.forEach(r => {
                    catData[r.category] = (catData[r.category] || 0) + r.amount;
                });

                const monthData = {};
                targetReports.forEach(r => {
                    const month = r.date.substring(0, 7); 
                    monthData[month] = (monthData[month] || 0) + r.amount;
                });
                const sortedMonths = Object.keys(monthData).sort();
                const monthValues = sortedMonths.map(m => monthData[m]);

                const quarterData = {};
                targetReports.forEach(r => {
                    const parts = r.date.split('-');
                    const year = parts[0];
                    const month = parseInt(parts[1], 10);
                    let quarter = 'Q1';
                    if (month >= 4 && month <= 6) quarter = 'Q2';
                    else if (month >= 7 && month <= 9) quarter = 'Q3';
                    else if (month >= 10 && month <= 12) quarter = 'Q4';
                    
                    const qKey = `${year}-${quarter}`;
                    quarterData[qKey] = (quarterData[qKey] || 0) + r.amount;
                });
                const sortedQuarters = Object.keys(quarterData).sort();
                const quarterValues = sortedQuarters.map(q => quarterData[q]);

                const primaryColor = '#D9926E';
                const chartColors = [
                    '#D9926E', 
                    '#8B4513', 
                    '#E8D4C8', 
                    '#4CAF50', 
                    '#2196F3', 
                    '#FFC107'  
                ];

                const categoryChart = new Chart(categoryCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(catData),
                        datasets: [{
                            data: Object.values(catData),
                            backgroundColor: chartColors.slice(0, Object.keys(catData).length),
                            borderWidth: 1,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    boxWidth: 12,
                                    font: { size: 11 }
                                }
                            }
                        }
                    }
                });

                let currentTrendType = 'month';
                const trendChart = new Chart(trendCtx, {
                    type: 'bar',
                    data: {
                        labels: sortedMonths.length > 0 ? sortedMonths : ['無數據'],
                        datasets: [{
                            label: '報帳總額 (¥)',
                            data: monthValues.length > 0 ? monthValues : [0],
                            backgroundColor: 'rgba(217, 146, 110, 0.8)',
                            borderColor: primaryColor,
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#E8D4C8' },
                                ticks: { font: { size: 10 } }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 } }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                const btnTrendMonth = document.getElementById('btnTrendMonth');
                const btnTrendQuarter = document.getElementById('btnTrendQuarter');

                if (btnTrendMonth && btnTrendQuarter) {
                    btnTrendMonth.addEventListener('click', () => {
                        if (currentTrendType === 'month') return;
                        currentTrendType = 'month';
                        
                        btnTrendMonth.style.background = primaryColor;
                        btnTrendMonth.style.color = 'white';
                        btnTrendQuarter.style.background = 'transparent';
                        btnTrendQuarter.style.color = 'var(--text-secondary)';

                        trendChart.data.labels = sortedMonths.length > 0 ? sortedMonths : ['無數據'];
                        trendChart.data.datasets[0].data = monthValues.length > 0 ? monthValues : [0];
                        trendChart.update();
                    });

                    btnTrendQuarter.addEventListener('click', () => {
                        if (currentTrendType === 'quarter') return;
                        currentTrendType = 'quarter';
                        
                        btnTrendQuarter.style.background = primaryColor;
                        btnTrendQuarter.style.color = 'white';
                        btnTrendMonth.style.background = 'transparent';
                        btnTrendMonth.style.color = 'var(--text-secondary)';

                        trendChart.data.labels = sortedQuarters.length > 0 ? sortedQuarters : ['無數據'];
                        trendChart.data.datasets[0].data = quarterValues.length > 0 ? quarterValues : [0];
                        trendChart.update();
                    });
                }
            }
        }

        // 啟動應用
        window.addEventListener('DOMContentLoaded', () => {
            new ExpenseReportApp();
        });
    </script>
</body>
</html>
