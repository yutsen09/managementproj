<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能報帳系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #FFFBF5;
            color: #333;
        }

        :root {
            --primary-color: #D9926E;
            --primary-dark: #8B4513;
            --primary-light: #E8D4C8;
            --success: #4CAF50;
            --danger: #F44336;
            --warning: #FFC107;
            --info: #2196F3;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F1ED;
            --bg-tertiary: #FFF8F0;
            --text-primary: #2C2C2A;
            --text-secondary: #888780;
            --text-tertiary: #B4B2A9;
            --border-color: #E8D4C8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        button, input[type="button"], input[type="submit"] {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
        }

        .btn-primary:hover {
            background: #C97B4A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 146, 110, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.75rem 1.5rem;
        }

        .btn-secondary:hover {
            background: rgba(217, 146, 110, 0.1);
        }

        .btn-success {
            background: var(--success);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 13px;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 13px;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(217, 146, 110, 0.1);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--bg-primary);
            border: 0.5px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .card h2 {
            font-size: 24px;
            color: var(--primary-dark);
            margin: 0 0 1.5rem 0;
        }

        .card h3 {
            font-size: 18px;
            color: var(--primary-dark);
            margin: 0 0 1rem 0;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            border: 0.5px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .grid-auto {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-approved {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .badge-pending {
            background: #FFF8E1;
            color: #F57F17;
        }

        .badge-rejected {
            background: #FFEBEE;
            color: #C62828;
        }

        .login-container {
            background: linear-gradient(135deg, #FFF5E6 0%, #FFF8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-box {
            background: var(--bg-primary);
            border-radius: 12px;
            border: 0.5px solid var(--border-color);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(217, 146, 110, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            font-size: 40px;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .demo-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .demo-accounts p {
            margin: 0.25rem 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 0.5px solid var(--border-color);
        }

        .page-header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--primary-dark);
        }

        .welcome-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 0.25rem;
        }

        .report-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .report-item {
            background: var(--bg-primary);
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: start;
            transition: all 0.3s;
        }

        .report-item:hover {
            box-shadow: 0 4px 12px rgba(217, 146, 110, 0.1);
            transform: translateY(-2px);
        }

        .report-content h4 {
            margin: 0 0 0.5rem 0;
            font-size: 16px;
            color: var(--text-primary);
        }

        .report-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0.5rem 0 0 0;
        }

        .report-actions {
            display: flex;
            gap: 0.5rem;
            flex-direction: column;
            min-width: 120px;
        }

        .dashboard {
            padding: 2rem 0;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: var(--bg-primary);
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .progress-bar {
            background: var(--bg-secondary);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.25rem;
        }

        .progress-fill {
            background: var(--primary-color);
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .category-item {
            margin-bottom: 1rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #FFF0E6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .user-details p {
            margin: 0;
        }

        .user-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .user-email {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .review-item {
            background: var(--bg-primary);
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            align-items: start;
            margin-bottom: 1rem;
        }

        .review-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .hidden {
            display: none !important;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-dark);
        }

        .modal-content {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .modal-buttons button {
            flex: 1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem 0.5rem;
            }

            .grid-auto, .grid-2, .form-row {
                grid-template-columns: 1fr;
            }

            .report-item, .review-item {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============ 應用程序核心 ============
        class ExpenseReportApp {
            constructor() {
                this.currentView = 'login';
                this.currentUser = null;
                this.showModal = false;
                this.modalMessage = '';
                
                // 初始化數據
                this.users = [
                    { id: 1, email: 'applicant@company.com', password: '123456', name: '王明', role: 'applicant', budget: 1000, spent: 450, loginCount: 0, failCount: 0 },
                    { id: 2, email: 'manager@company.com', password: '123456', name: '李經理', role: 'manager', budget: 50000, spent: 12000, loginCount: 0, failCount: 0 },
                    { id: 3, email: 'admin@company.com', password: '123456', name: '陳管理員', role: 'admin', budget: 100000, spent: 0, loginCount: 0, failCount: 0 }
                ];

                this.reports = [
                    { id: 1, applicantId: 1, amount: 450, date: '2024-01-15', category: '辦公用品', department: '市場部', status: 'approved', description: '列印紙張', createdAt: '2024-01-16' },
                    { id: 2, applicantId: 2, amount: 5000, date: '2024-02-01', category: '出差費用', department: '銷售部', status: 'pending', description: '深圳出差機票酒店', createdAt: '2024-02-02' }
                ];

                this.loginAttempts = {};
                this.lockedIPs = new Set();
                
                this.init();
            }

            init() {
                this.render();
                this.attachEventListeners();
            }

            showMessage(message) {
                this.modalMessage = message;
                this.showModal = true;
                this.render();
                setTimeout(() => {
                    this.showModal = false;
                    this.render();
                }, 3000);
            }

            handleLogin(email, password) {
                const userIP = 'user-ip';

                if (this.lockedIPs.has(userIP)) {
                    this.showMessage('您的IP已被鎖定，請稍後再試');
                    return;
                }

                const user = this.users.find(u => u.email === email);
                if (!user || user.password !== password) {
                    const attempts = (this.loginAttempts[userIP] || 0) + 1;
                    this.loginAttempts[userIP] = attempts;

                    if (attempts >= 5) {
                        this.lockedIPs.add(userIP);
                        this.showMessage('密碼錯誤5次，您的IP已被鎖定2小時');
                        return;
                    }

                    this.showMessage(`密碼錯誤，還有${5 - attempts}次機會`);
                    return;
                }

                if (user.loginCount >= 5) {
                    this.currentUser = { ...user, needsPasswordChange: true };
                    this.currentView = 'changePassword';
                    this.render();
                    return;
                }

                user.loginCount++;
                this.currentUser = { ...user };
                this.loginAttempts[userIP] = 0;
                this.currentView = 'dashboard';

                if (user.failCount > 0) {
                    this.showMessage(`提醒：您上次有${user.failCount}次登入錯誤`);
                }
                this.render();
            }

            handleLogout() {
                this.currentUser = null;
                this.currentView = 'login';
                this.render();
            }

            handleChangePassword(newPassword) {
                if (newPassword.length < 6) {
                    this.showMessage('密碼至少6個字符');
                    return;
                }
                
                const user = this.users.find(u => u.id === this.currentUser.id);
                if (user) {
                    user.password = newPassword;
                    user.loginCount = 0;
                }

                this.currentUser = null;
                this.currentView = 'login';
                this.showMessage('密碼已更新');
                this.render();
            }

            handleSubmitReport(formData) {
                const amount = parseFloat(formData.amount);
                const newReport = {
                    id: Math.max(...this.reports.map(r => r.id), 0) + 1,
                    applicantId: this.currentUser.id,
                    amount: amount,
                    date: formData.date,
                    category: formData.category,
                    department: formData.department,
                    description: formData.description,
                    status: amount <= 1000 ? 'approved' : 'pending',
                    createdAt: new Date().toISOString().split('T')[0]
                };
                
                this.reports.push(newReport);
                this.showMessage(newReport.status === 'approved' ? '報告已自動通過' : '報告已提交等待審批');
                this.currentView = 'dashboard';
                this.render();
            }

            handleApproveReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    report.status = 'approved';
                    this.showMessage('已通過申請');
                    this.render();
                }
            }

            handleRejectReport(reportId) {
                const report = this.reports.find(r => r.id === reportId);
                if (report) {
                    report.status = 'rejected';
                    this.showMessage('已退回申請');
                    this.render();
                }
            }

            handleDeleteUser(userId) {
                if (confirm('確定要註銷此帳號嗎？')) {
                    this.users = this.users.filter(u => u.id !== userId);
                    this.showMessage('已註銷帳號');
                    this.render();
                }
            }

            exportToExcel(data, filename) {
                let csv = '';
                if (data.length > 0) {
                    const headers = Object.keys(data[0]);
                    csv += headers.join(',') + '\n';
                    data.forEach(row => {
                        csv += headers.map(h => row[h]).join(',') + '\n';
                    });
                }
                
                const link = document.createElement('a');
                link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
                link.download = filename;
                link.click();
                this.showMessage('已匯出 Excel');
            }

            attachEventListeners() {
                const app = document.getElementById('app');
                
                // 登入表單
                const loginForm = app.querySelector('#loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const email = app.querySelector('#loginEmail').value;
                        const password = app.querySelector('#loginPassword').value;
                        this.handleLogin(email, password);
                    });
                }

                // 修改密碼表單
                const changePasswordForm = app.querySelector('#changePasswordForm');
                if (changePasswordForm) {
                    changePasswordForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const newPassword = app.querySelector('#newPassword').value;
                        this.handleChangePassword(newPassword);
                    });
                }

                // 新建報告表單
                const newReportForm = app.querySelector('#newReportForm');
                if (newReportForm) {
                    newReportForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            amount: app.querySelector('#amount').value,
                            date: app.querySelector('#date').value,
                            category: app.querySelector('#category').value,
                            department: app.querySelector('#department').value,
                            description: app.querySelector('#description').value
                        };
                        this.handleSubmitReport(formData);
                    });
                }

                // 登出按鈕
                app.querySelectorAll('[data-action="logout"]').forEach(btn => {
                    btn.addEventListener('click', () => this.handleLogout());
                });

                // 返回按鈕
                app.querySelectorAll('[data-action="back"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const view = e.target.dataset.view;
                        this.currentView = view;
                        this.render();
                    });
                });

                // 導航按鈕
                app.querySelectorAll('[data-view]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (!e.target.hasAttribute('data-action')) {
                            const view = e.target.dataset.view;
                            this.currentView = view;
                            this.render();
                        }
                    });
                });

                // 審批按鈕
                app.querySelectorAll('[data-approve]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const reportId = parseInt(e.target.dataset.approve);
                        this.handleApproveReport(reportId);
                    });
                });

                app.querySelectorAll('[data-reject]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const reportId = parseInt(e.target.dataset.reject);
                        this.handleRejectReport(reportId);
                    });
                });

                // 刪除用戶
                app.querySelectorAll('[data-delete-user]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const userId = parseInt(e.target.dataset.deleteUser);
                        this.handleDeleteUser(userId);
                    });
                });

                // 匯出按鈕
                app.querySelectorAll('[data-export]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const type = e.target.dataset.export;
                        if (type === 'reports') {
                            const userReports = this.reports.filter(r => 
                                this.currentUser.role === 'applicant' ? r.applicantId === this.currentUser.id : true
                            );
                            this.exportToExcel(userReports, 'reports.csv');
                        } else if (type === 'analytics') {
                            this.exportToExcel(this.reports, 'analytics.csv');
                        }
                    });
                });

                // 關閉彈窗
                const modalOverlay = app.querySelector('.modal-overlay');
                if (modalOverlay) {
                    modalOverlay.addEventListener('click', (e) => {
                        if (e.target === modalOverlay) {
                            this.showModal = false;
                            this.render();
                        }
                    });
                }
            }

            render() {
                const app = document.getElementById('app');
                
                if (this.currentView === 'login') {
                    app.innerHTML = this.renderLogin();
                } else if (this.currentView === 'changePassword') {
                    app.innerHTML = this.renderChangePassword();
                } else if (this.currentView === 'dashboard') {
                    app.innerHTML = this.renderDashboard();
                } else if (this.currentView === 'newReport') {
                    app.innerHTML = this.renderNewReport();
                } else if (this.currentView === 'reports') {
                    app.innerHTML = this.renderReports();
                } else if (this.currentView === 'review') {
                    app.innerHTML = this.renderReview();
                } else if (this.currentView === 'analytics') {
                    app.innerHTML = this.renderAnalytics();
                } else if (this.currentView === 'users') {
                    app.innerHTML = this.renderUsers();
                }

                // 添加通知
                if (this.showModal) {
                    const modal = document.createElement('div');
                    modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="modal">
                            <p class="modal-content">${this.modalMessage}</p>
                        </div>
                    `;
                    app.appendChild(modal);
                }

                this.attachEventListeners();
            }

            renderLogin() {
                return `
                    <div class="login-container">
                        <div class="login-box">
                            <div class="login-header">
                                <div class="login-icon">📊</div>
                                <h1 class="login-title">智能報帳系統</h1>
                                <p class="login-subtitle">高效管理 • 透明審核</p>
                            </div>

                            <form id="loginForm">
                                <div class="form-group">
                                    <label>郵箱</label>
                                    <input type="email" id="loginEmail" placeholder="user@company.com" required />
                                </div>
                                <div class="form-group">
                                    <label>密碼</label>
                                    <input type="password" id="loginPassword" placeholder="輸入密碼" required />
                                </div>
                                <button type="submit" class="btn-primary" style="width: 100%;">
                                    登入
                                </button>
                            </form>

                            <div class="demo-accounts">
                                <strong>測試帳號：</strong>
                                <p>• 申請者: applicant@company.com</p>
                                <p>• 主管: manager@company.com</p>
                                <p>• 管理者: admin@company.com</p>
                                <p style="margin-top: 0.5rem; font-style: italic;">密碼皆為: 123456</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderChangePassword() {
                return `
                    <div class="login-container">
                        <div class="login-box">
                            <h2>密碼過期 - 請更新密碼</h2>
                            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 14px;">
                                您已登入超過5次，請更新密碼以確保帳號安全
                            </p>

                            <form id="changePasswordForm">
                                <div class="form-group">
                                    <label>新密碼</label>
                                    <input type="password" id="newPassword" placeholder="至少6個字符" required />
                                </div>
                                <button type="submit" class="btn-primary" style="width: 100%; margin-bottom: 0.5rem;">
                                    更新密碼
                                </button>
                            </form>
                            <button class="btn-secondary" data-action="logout" style="width: 100%;">
                                登出
                            </button>
                        </div>
                    </div>
                `;
            }

            renderDashboard() {
                const userReports = this.reports.filter(r => 
                    this.currentUser.role === 'applicant' ? r.applicantId === this.currentUser.id : true
                );
                const role = this.currentUser.role === 'applicant' ? '申請者' : 
                            this.currentUser.role === 'manager' ? '主管' : '系統管理員';

                return `
                    <div class="container dashboard">
                        <div class="page-header">
                            <div>
                                <h1>歡迎，${this.currentUser.name}${Math.random() > 0.5 ? '先生' : '女士'}</h1>
                                <p class="welcome-text">${role}</p>
                            </div>
                            <button class="btn-secondary" data-action="logout">登出</button>
                        </div>

                        <div class="grid grid-auto">
                            <div class="stat-card">
                                <p class="stat-label">額度餘額</p>
                                <p class="stat-value">¥${this.currentUser.budget - this.currentUser.spent}</p>
                                <p class="stat-label">已使用: ¥${this.currentUser.spent} / ¥${this.currentUser.budget}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">待審批</p>
                                <p class="stat-value">${userReports.filter(r => r.status === 'pending').length}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">已通過</p>
                                <p class="stat-value">${userReports.filter(r => r.status === 'approved').length}</p>
                            </div>
                        </div>

                        <div class="nav-buttons">
                            ${this.currentUser.role === 'applicant' ? `<button class="btn-primary" data-view="newReport">新建報告</button>` : ''}
                            <button class="btn-secondary" data-view="reports">我的報告</button>
                            ${this.currentUser.role !== 'applicant' ? `<button class="btn-secondary" data-view="review">待審核</button>` : ''}
                            ${this.currentUser.role === 'admin' ? `
                                <button class="btn-secondary" data-view="analytics">數據分析</button>
                                <button class="btn-secondary" data-view="users">用戶管理</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            renderNewReport() {
                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div class="card">
                            <h2>新建報帳申請</h2>

                            <form id="newReportForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>金額 (¥)</label>
                                        <input type="number" id="amount" placeholder="0.00" required />
                                    </div>
                                    <div class="form-group">
                                        <label>日期</label>
                                        <input type="date" id="date" value="${new Date().toISOString().split('T')[0]}" required />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>類別</label>
                                    <select id="category">
                                        <option>辦公用品</option>
                                        <option>出差費用</option>
                                        <option>會議費用</option>
                                        <option>培訓費用</option>
                                        <option>其他</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>負責單位</label>
                                    <input type="text" id="department" placeholder="如：市場部" required />
                                </div>

                                <div class="form-group">
                                    <label>描述</label>
                                    <textarea id="description" placeholder="請簡要描述報帳事由" required></textarea>
                                </div>

                                <div style="padding: 1rem; background: var(--bg-secondary); border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 1.5rem;">
                                    <p>上傳相關文件（發票、收據等）</p>
                                    <p style="font-size: 12px; color: var(--text-tertiary); margin: 0.5rem 0 0 0;">點擊或拖拽上傳</p>
                                </div>

                                <button type="submit" class="btn-primary" style="width: 100%;">提交申請</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            renderReports() {
                const userReports = this.reports.filter(r => 
                    this.currentUser.role === 'applicant' ? r.applicantId === this.currentUser.id : true
                );

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳記錄</h2>
                            <button class="btn-secondary btn-small" data-export="reports">匯出 Excel</button>
                        </div>

                        <div class="report-list">
                            ${userReports.length > 0 ? userReports.map(report => `
                                <div class="report-item">
                                    <div>
                                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                                            <span style="font-size: 16px; font-weight: 600;">¥${report.amount}</span>
                                            <span class="badge ${report.status === 'approved' ? 'badge-approved' : report.status === 'pending' ? 'badge-pending' : 'badge-rejected'}">
                                                ${report.status === 'approved' ? '✓ 已通過' : report.status === 'pending' ? '⏳ 審核中' : '✕ 已退回'}
                                            </span>
                                        </div>
                                        <p class="report-meta">${report.category} • ${report.date} • ${report.department}</p>
                                        <p class="report-meta">${report.description}</p>
                                    </div>
                                    <button class="btn-secondary btn-small" onclick="alert('報告詳情\\n\\n金額: ¥${report.amount}\\n日期: ${report.date}\\n類別: ${report.category}\\n部門: ${report.department}\\n狀態: ${report.status}\\n描述: ${report.description}')">查看詳情</button>
                                </div>
                            `).join('') : '<div class="empty-state"><p>沒有報告記錄</p></div>'}
                        </div>
                    </div>
                `;
            }

            renderReview() {
                const pendingReports = this.reports.filter(r => r.status === 'pending');

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>待審核報告 (${pendingReports.length})</h2>

                        <div class="report-list">
                            ${pendingReports.length > 0 ? pendingReports.map(report => {
                                const applicant = this.users.find(u => u.id === report.applicantId);
                                return `
                                    <div class="review-item">
                                        <div>
                                            <div class="user-info">
                                                <div class="avatar">${applicant.name.charAt(0)}</div>
                                                <div class="user-details">
                                                    <p class="user-name">${applicant.name}</p>
                                                    <p class="user-email">申請金額: ¥${report.amount}</p>
                                                </div>
                                            </div>
                                            <p>${report.description}</p>
                                            <p class="report-meta">${report.category} • ${report.date}</p>
                                        </div>
                                        <div class="review-buttons">
                                            <button class="btn-success" data-approve="${report.id}">✓ 通過</button>
                                            <button class="btn-danger" data-reject="${report.id}">✕ 退回</button>
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<div class="empty-state"><p>沒有待審核的報告</p></div>'}
                        </div>
                    </div>
                `;
            }

            renderAnalytics() {
                const categoryTotal = this.reports.reduce((acc, r) => {
                    acc[r.category] = (acc[r.category] || 0) + r.amount;
                    return acc;
                }, {});
                const totalAmount = Object.values(categoryTotal).reduce((a, b) => a + b, 0);

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>報帳數據分析</h2>

                        <div class="grid grid-auto">
                            <div class="stat-card">
                                <p class="stat-label">總報帳額</p>
                                <p class="stat-value">¥${totalAmount}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">報告數量</p>
                                <p class="stat-value">${this.reports.length}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">平均金額</p>
                                <p class="stat-value">¥${Math.round(totalAmount / this.reports.length)}</p>
                            </div>
                        </div>

                        <div class="chart-container">
                            <h3>按類別統計</h3>
                            ${Object.entries(categoryTotal).map(([cat, amt]) => {
                                const percentage = (amt / totalAmount) * 100;
                                return `
                                    <div class="category-item">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 13px;">
                                            <span>${cat}</span>
                                            <span style="font-weight: 600; color: var(--primary-color);">¥${amt}</span>
                                        </div>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width: ${percentage}%;"></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <button class="btn-secondary" data-export="analytics">匯出為 Excel</button>
                    </div>
                `;
            }

            renderUsers() {
                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>用戶管理</h2>

                        <div class="report-list">
                            ${this.users.map(user => `
                                <div class="report-item">
                                    <div class="user-info" style="margin-bottom: 0;">
                                        <div class="avatar">${user.name.charAt(0)}</div>
                                        <div class="user-details">
                                            <p class="user-name">${user.name}</p>
                                            <p class="user-email">${user.email}</p>
                                            <p class="report-meta">
                                                額度: ¥${user.budget} | 角色: ${user.role === 'applicant' ? '申請者' : user.role === 'manager' ? '主管' : '管理員'}
                                            </p>
                                        </div>
                                    </div>
                                    <button class="btn-danger" data-delete-user="${user.id}">註銷帳號</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // 啟動應用
        window.addEventListener('DOMContentLoaded', () => {
            new ExpenseReportApp();
        });
    </script>
</body>
</html>
