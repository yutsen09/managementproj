            renderNewReport() {
                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div class="card">
                            <h2>新建報帳申請</h2>

                            <form id="newReportForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>金額 (¥)</label>
                                        <input type="number" step="0.01" id="amount" placeholder="0.00" required />
                                    </div>
                                    <div class="form-group">
                                        <label>日期</label>
                                        <input type="date" id="date" value="${new Date().toISOString().split('T')[0]}" required />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>類別</label>
                                    <select id="category">
                                        <option>辦公用品</option>
                                        <option>出差費用</option>
                                        <option>會議費用</option>
                                        <option>培訓費用</option>
                                        <option>其他</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>負責單位</label>
                                    <input type="text" id="department" placeholder="如：市場部" required />
                                </div>

                                <div class="form-group">
                                    <label>描述</label>
                                    <textarea id="description" placeholder="請簡要描述報帳事由" required></textarea>
                                </div>

                                <div id="uploadArea" style="padding: 1rem; background: var(--bg-secondary); border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 1.5rem; border: 1px dashed var(--border-color); transition: all 0.3s;">
                                    <p id="uploadStatus">上傳相關文件（發票、收據等）</p>
                                    <p style="font-size: 12px; color: var(--text-tertiary); margin: 0.5rem 0 0 0;">點擊或拖拽上傳</p>
                                    <input type="file" id="attachmentInput" style="display: none;" />
                                </div>

                                <button type="submit" class="btn-primary" style="width: 100%;">提交申請</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            renderReports() {
                const userReports = this.reports;

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳記錄</h2>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn-secondary btn-small" data-view="analytics">數據分析</button>
                                <button class="btn-secondary btn-small" data-export="reports">匯出 Excel</button>
                            </div>
                        </div>

                        <div class="report-list">
                            ${userReports.length > 0 ? userReports.map(report => `
                                <div class="report-item">
                                    <div>
                                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                                            <span style="font-size: 16px; font-weight: 600;">¥${report.amount.toFixed(2)}</span>
                                            <span class="badge ${report.status === '已通過' ? 'badge-approved' : report.status === '審核中' ? 'badge-pending' : 'badge-rejected'}">
                                                ${report.status === '已通過' ? '✓ 已通過' : report.status === '審核中' ? '⏳ 審核中' : '✕ 已退回'}
                                            </span>
                                        </div>
                                        <p class="report-meta">${report.category} • ${report.date} • ${report.department}</p>
                                        <p class="report-meta">${report.description}</p>
                                        ${report.fileUrl ? `<p class="report-meta">附件: <a href="${report.fileUrl}" target="_blank" style="color: var(--primary-color); text-decoration: underline;">${report.fileName}</a></p>` : ''}
                                    </div>
                                    <button class="btn-secondary btn-small" onclick="alert('報告詳情\\n\\n金額: ¥${report.amount}\\n日期: ${report.date}\\n類別: ${report.category}\\n部門: ${report.department}\\n狀態: ${report.status}\\n描述: ${report.description}')">查看詳情</button>
                                </div>
                            `).join('') : '<div class="empty-state"><p>沒有報告記錄</p></div>'}
                        </div>
                    </div>
                `;
            }

            renderReview() {
                const pendingReports = this.reports;

                const listHtml = pendingReports.length > 0 ? pendingReports.map(report => {
                    const applicantName = report.applicantName || '未知使用者';
                    return `
                        <div class="review-item">
                            <div>
                                <div class="user-info">
                                    <div class="avatar">${applicantName.charAt(0)}</div>
                                    <div class="user-details">
                                        <p class="user-name">${applicantName}</p>
                                        <p class="user-email">申請金額: ¥${report.amount.toFixed(2)}</p>
                                    </div>
                                </div>
                                <p>${report.description}</p>
                                <p class="report-meta">${report.category} • ${report.date} • ${report.department}</p>
                                ${report.fileUrl ? `<p class="report-meta">附件: <a href="${report.fileUrl}" target="_blank" style="color: var(--primary-color); text-decoration: underline;">${report.fileName}</a></p>` : ''}
                            </div>
                            <div class="review-buttons">
                                <button class="btn-success" data-approve="${report.id}">✓ 通過</button>
                                <button class="btn-danger" data-reject="${report.id}">✕ 退回</button>
                            </div>
                        </div>
                    `;
                }).join('') : '<div class="empty-state"><p>沒有待審核的報告</p></div>';

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳審核面板</h2>
                        </div>

                        <div class="report-list">
                            ${listHtml}
                        </div>
                    </div>
                `;
            }

            renderAnalytics() {
                const data = this.analyticsData || { totalAmount: 0, reportCount: 0, averageAmount: 0, categoryTotal: {} };
                const categoryTotal = data.categoryTotal;
                const totalAmount = data.totalAmount;
                const approvedAmount = this.reports
                    .filter(r => r.status === '已通過')
                    .reduce((a, b) => a + b.amount, 0);

                const categoryRows = Object.entries(categoryTotal).map(([cat, amt]) => {
                    const percentage = totalAmount > 0 ? ((amt / totalAmount) * 100).toFixed(1) : '0.0';
                    return `
                        <tr>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color);">${cat}</td>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color); text-align: right; font-weight: 500;">¥${amt.toFixed(2)}</td>
                            <td style="padding: 0.75rem; border-bottom: 0.5px solid var(--border-color); text-align: right; color: var(--text-secondary);">${percentage}%</td>
                        </tr>
                    `;
                }).join('');

                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>報帳數據分析中心</h2>
                            <button class="btn-secondary btn-small" data-export="analytics">匯出報帳明細</button>
                        </div>

                        <div class="grid grid-auto">
                            <div class="stat-card">
                                <p class="stat-label">累積申報總額</p>
                                <p class="stat-value">¥${totalAmount.toFixed(2)}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">已核准通過總額</p>
                                <p class="stat-value" style="color: var(--success);">¥${approvedAmount.toFixed(2)}</p>
                            </div>
                            <div class="stat-card">
                                <p class="stat-label">申報報告數量</p>
                                <p class="stat-value" style="color: var(--info);">${this.reports.length} 件</p>
                            </div>
                        </div>

                        <div class="grid grid-2" style="margin-top: 1.5rem;">
                            <div class="chart-container" style="display: flex; flex-direction: column;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                    <h3 style="margin: 0; font-size: 16px; color: var(--primary-dark);">報帳趨勢分析</h3>
                                    <div style="display: flex; gap: 0.25rem; background: var(--bg-secondary); padding: 2px; border-radius: 6px;">
                                        <button id="btnTrendMonth" class="btn-small" style="padding: 4px 8px; font-size: 12px; background: var(--primary-color); color: white; border-radius: 4px;">月度</button>
                                        <button id="btnTrendQuarter" class="btn-small" style="padding: 4px 8px; font-size: 12px; background: transparent; color: var(--text-secondary); border-radius: 4px;">季度</button>
                                    </div>
                                </div>
                                <div style="flex: 1; position: relative; min-height: 250px;">
                                    <canvas id="trendChart"></canvas>
                                </div>
                            </div>

                            <div class="chart-container" style="display: flex; flex-direction: column;">
                                <h3 style="margin-bottom: 1rem; font-size: 16px; color: var(--primary-dark);">費用類別分佈</h3>
                                <div style="flex: 1; position: relative; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                                    <canvas id="categoryChart" style="max-height: 250px; max-width: 250px;"></canvas>
                                </div>
                            </div>
                        </div>

                        <div class="card" style="margin-top: 1.5rem; padding: 1.5rem;">
                            <h3 style="margin-bottom: 1rem; font-size: 18px; color: var(--primary-dark);">類別數據統整</h3>
                            <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                                <thead>
                                    <tr style="background: var(--bg-secondary); text-align: left;">
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary);">類別</th>
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary); text-align: right;">報帳總額</th>
                                        <th style="padding: 0.75rem; font-weight: 600; color: var(--text-primary); text-align: right;">比例</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${categoryRows || '<tr><td colspan="3" style="text-align:center; padding: 2rem; color: var(--text-secondary);">暫無申報數據</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            initAnalyticsCharts() {
                if (typeof Chart === 'undefined') {
                    setTimeout(() => this.initAnalyticsCharts(), 100);
                    return;
                }

                const trendCtx = document.getElementById('trendChart');
                const categoryCtx = document.getElementById('categoryChart');
                if (!trendCtx || !categoryCtx) return;

                const targetReports = this.reports;

                const catData = {};
                targetReports.forEach(r => {
                    catData[r.category] = (catData[r.category] || 0) + r.amount;
                });

                const monthData = {};
                targetReports.forEach(r => {
                    const month = r.date.substring(0, 7); 
                    monthData[month] = (monthData[month] || 0) + r.amount;
                });
                const sortedMonths = Object.keys(monthData).sort();
                const monthValues = sortedMonths.map(m => monthData[m]);

                const quarterData = {};
                targetReports.forEach(r => {
                    const parts = r.date.split('-');
                    const year = parts[0];
                    const month = parseInt(parts[1], 10);
                    let quarter = 'Q1';
                    if (month >= 4 && month <= 6) quarter = 'Q2';
                    else if (month >= 7 && month <= 9) quarter = 'Q3';
                    else if (month >= 10 && month <= 12) quarter = 'Q4';
                    
                    const qKey = `${year}-${quarter}`;
                    quarterData[qKey] = (quarterData[qKey] || 0) + r.amount;
                });
                const sortedQuarters = Object.keys(quarterData).sort();
                const quarterValues = sortedQuarters.map(q => quarterData[q]);

                const primaryColor = '#D9926E';
                const chartColors = [
                    '#D9926E', 
                    '#8B4513', 
                    '#E8D4C8', 
                    '#4CAF50', 
                    '#2196F3', 
                    '#FFC107'  
                ];

                const categoryChart = new Chart(categoryCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(catData),
                        datasets: [{
                            data: Object.values(catData),
                            backgroundColor: chartColors.slice(0, Object.keys(catData).length),
                            borderWidth: 1,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    boxWidth: 12,
                                    font: { size: 11 }
                                }
                            }
                        }
                    }
                });

                let currentTrendType = 'month';
                const trendChart = new Chart(trendCtx, {
                    type: 'bar',
                    data: {
                        labels: sortedMonths,
                        datasets: [{
                            label: '報帳總額 (¥)',
                            data: monthValues,
                            backgroundColor: 'rgba(217, 146, 110, 0.8)',
                            borderColor: primaryColor,
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#E8D4C8' },
                                ticks: { font: { size: 10 } }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 } }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                const btnTrendMonth = document.getElementById('btnTrendMonth');
                const btnTrendQuarter = document.getElementById('btnTrendQuarter');

                if (btnTrendMonth && btnTrendQuarter) {
                    btnTrendMonth.addEventListener('click', () => {
                        if (currentTrendType === 'month') return;
                        currentTrendType = 'month';
                        
                        btnTrendMonth.style.background = primaryColor;
                        btnTrendMonth.style.color = 'white';
                        btnTrendQuarter.style.background = 'transparent';
                        btnTrendQuarter.style.color = 'var(--text-secondary)';

                        trendChart.data.labels = sortedMonths;
                        trendChart.data.datasets[0].data = monthValues;
                        trendChart.update();
                    });

                    btnTrendQuarter.addEventListener('click', () => {
                        if (currentTrendType === 'quarter') return;
                        currentTrendType = 'quarter';
                        
                        btnTrendQuarter.style.background = primaryColor;
                        btnTrendQuarter.style.color = 'white';
                        btnTrendMonth.style.background = 'transparent';
                        btnTrendMonth.style.color = 'var(--text-secondary)';

                        trendChart.data.labels = sortedQuarters;
                        trendChart.data.datasets[0].data = quarterValues;
                        trendChart.update();
                    });
                }
            }

            renderUsers() {
                const usersList = this.users || [];
                return `
                    <div class="container">
                        <a class="back-link" data-action="back" data-view="dashboard">← 返回</a>

                        <h2>用戶管理</h2>

                        <div class="report-list">
                            ${usersList.map(user => `
                                <div class="report-item">
                                    <div class="user-info" style="margin-bottom: 0;">
                                        <div class="avatar">${user.name.charAt(0)}</div>
                                        <div class="user-details">
                                            <p class="user-name">${user.name}</p>
                                            <p class="user-email">${user.email}</p>
                                            <p class="report-meta">
                                                可用額度: ¥${user.current_quota.toFixed(2)} | 預設總額: ¥${user.budget.toFixed(2)}
                                            </p>
                                            <p class="report-meta">
                                                角色: ${user.role === 'applicant' ? '申請者' : user.role === 'manager' ? '主管' : '管理員'} | 狀態: ${user.status}
                                            </p>
                                        </div>
                                    </div>
                                    ${user.status !== '已註銷' ? `<button class="btn-danger" data-delete-user="${user.id}">註銷帳號</button>` : '<span class="badge badge-rejected">已註銷</span>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new ExpenseReportApp();
        });
    </script>
</body>
</html>
